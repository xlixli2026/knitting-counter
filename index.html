<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KnitCount</title>
<!-- Hosting extras: icons / manifest / iOS home-screen. All optional — the
     app still works as a lone file:// page when these 404. -->
<meta name="theme-color" content="#202835">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KnitCount">
<style>
  :root {
    --bg: #202835;
    --card: #f4f4f4;
    --text: #ffffff;
    --muted: rgba(255, 255, 255, 0.78);
    --line: rgba(255, 255, 255, 0.35);
    --accent: #3f8f86;        /* muted teal */
    --accent-soft: #b8ded3;
    --btn: rgba(255, 255, 255, 0.18);
  }

  /* Cards are light on a dark page — re-scope the neutral tokens for
     everything drawn on top of --card so text and controls stay legible. */
  .card, .modal, .prow {
    --text: #17222e;
    --muted: rgba(23, 34, 46, 0.6);
    --line: rgba(23, 34, 46, 0.16);
    --btn: #e5e5e5;
    color: var(--text);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    /* extra bottom padding keeps the last card/row clear of the pinned button */
    padding: 32px 16px calc(104px + env(safe-area-inset-bottom));
  }

  /* Flex column so History's margin-top:auto can push it to the bottom of
     the screen when the counters don't fill it; when they do, that auto
     margin collapses to 0 and History's own padding-top is the only gap. */
  #screen-project {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }
  /* #screen-project's own display:flex (an ID selector) outranks the UA
     stylesheet's [hidden]{display:none}, so it must be restated here or the
     empty counter screen shows through behind the empty-projects state. */
  #screen-project[hidden] { display: none; }

  header {
    position: relative;
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.2px;
    margin: 0;
    color: var(--text);
  }

  /* Own row above the project name, aligned to the left edge. */
  .back {
    display: block;
    margin: 0 0 10px -10px;   /* -10px cancels the padding so ‹ sits on the edge */
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .back:hover, .back:focus-visible { color: var(--text); background: var(--btn); outline: none; }

  /* Project-type icon + editable name, centered as a pair. The input is
     auto-sized to its text from JS so the icon hugs the name. */
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #project-icon {
    width: 24px;
    height: 24px;
    flex: 0 0 auto;
    color: #ced0d3;        /* --muted flattened onto the navy bg */
  }
  /* Same footprint as the icon on the other side keeps the name centered. */
  .title-edit {
    width: 24px;
    height: 24px;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .title-edit:hover, .title-edit:focus-visible { color: var(--text); background: var(--btn); outline: none; }
  .title-edit svg { width: 18px; height: 18px; flex: none; display: block; }
  .project-name {
    display: block;
    min-width: 40px;
    max-width: calc(100% - 96px);   /* icon + pencil + gaps */
    padding: 2px 8px 2px 4px;   /* less on the icon side only; pencil side unchanged */
    border: none;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.2px;
    text-align: center;
    border-radius: 8px;
    outline: none;
    pointer-events: none;      /* rename via the pencil only */
  }
  .project-name.editing { pointer-events: auto; }
  .project-name::placeholder { color: var(--muted); font-weight: 400; }
  /* the selected text is the only edit-mode indicator — no background box */

  /* Projects screen */
  .plist {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  /* Each row slides over a hidden Delete button (swipe left to reveal). */
  .prow-wrap {
    position: relative;
    overflow: hidden;          /* the sliding row stays inside its slot */
    border-radius: 14px;
  }
  .p-delete {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 88px;
    border: none;
    border-radius: 14px;
    background: #e5484d;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    touch-action: manipulation;
  }
  .prow {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 12px 20px 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    cursor: pointer;
    touch-action: pan-y;       /* horizontal swipes belong to the row */
    transition: transform .2s ease;
  }
  .prow.swiped { transform: translateX(-96px); }
  @media (hover: hover) {
    .prow:hover { border-color: rgba(23, 34, 46, 0.45); }
  }
  .p-icon {
    flex: 0 0 auto;
    width: 26px;
    height: 26px;
    color: #6f767d;        /* card-scope --muted flattened onto --card */
  }
  .p-icon svg { width: 100%; height: 100%; display: block; }
  /* Renamed via the pencil button only — taps on the name fall through to
     the row (open the project) until editing is switched on. */
  .p-name {
    flex: 0 1 auto;
    min-width: 34px;
    max-width: calc(100% - 80px);   /* icon + gaps + pencil button */
    margin-right: auto;
    border: none;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 4px 6px;
    border-radius: 6px;
    outline: none;
    text-overflow: ellipsis;
    pointer-events: none;
  }
  .p-name.editing { pointer-events: auto; }
  .p-name::placeholder { color: var(--muted); font-weight: 400; }
  /* the selected text is the only edit-mode indicator — no background box */
  .p-edit {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .p-edit:hover, .p-edit:focus-visible { color: var(--text); background: var(--btn); outline: none; }

  .list {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Each .row holds 1 or 2 cards, always centered. */
  .row {
    display: flex;
    gap: 18px;
    justify-content: center;
  }

  .card {
    position: relative;
    flex: 0 0 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 58px 38px 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    transition: opacity .18s ease, transform .18s ease;
  }

  /* Compact mode: as soon as any row has two cards, ALL cards shrink to
     half width so the layout stays consistent. Applied automatically. */
  .list.compact .card,
  .row.pair-preview .card {
    flex: 0 0 calc(50% - 9px);
    padding: 53px 20px 10px;
  }
  .list.compact .label,
  .row.pair-preview .label { left: 54px; right: 54px; font-size: 13px; }
  .list.compact .rowmark,
  .row.pair-preview .rowmark { font-size: 11px; padding: 3px 7px; }
  .list.compact .counter-row,
  .row.pair-preview .counter-row { gap: 12px; }
  .list.compact .step,
  .row.pair-preview .step { width: 44px; height: 44px; font-size: 24px; }
  .list.compact .count,
  .row.pair-preview .count { font-size: 34px; }
  .list.compact .drag,
  .row.pair-preview .drag { left: 0; width: 14px; }

  @media (max-width: 420px) {
    .list.compact .counter-row,
    .row.pair-preview .counter-row { gap: 8px; }
    .list.compact .step,
    .row.pair-preview .step { width: 40px; height: 40px; font-size: 22px; }
    .list.compact .count,
    .row.pair-preview .count { font-size: 28px; }
  }

  .card.removing {
    opacity: 0;
    transform: scale(0.96);
  }

  .remove {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 20px;
    line-height: 1;
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .remove:hover, .remove:focus-visible { color: var(--text); background: var(--btn); outline: none; }

  .rowmark {
    position: absolute;
    top: 12px;
    left: 12px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-size: 11.5px;
    letter-spacing: 0.3px;
    padding: 3px 9px;
    border-radius: 999px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .rowmark:hover, .rowmark:focus-visible { color: var(--text); background: var(--btn); outline: none; }

  /* Centered label in the top row — more visible than the rowmark pill. */
  .label {
    position: absolute;
    top: 12px;
    left: 118px;
    right: 118px;
    border: none;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 14.5px;
    font-weight: 500;
    text-align: center;
    padding: 3px 4px;
    border-radius: 6px;
    outline: none;
  }
  .label::placeholder { color: var(--muted); font-weight: 400; }
  .label:hover { background: var(--btn); }
  .label:focus { background: var(--btn); }

  /* drag-to-reorder */
  .drag {
    position: absolute;
    left: 2px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    border-radius: 6px;
    color: var(--muted);
    font-size: 13px;
    cursor: grab;
    touch-action: none;      /* handle owns the gesture — page still scrolls elsewhere */
    user-select: none;
    -webkit-user-select: none;
  }
  .drag:hover, .drag:focus-visible { color: var(--text); background: var(--btn); outline: none; }

  .card.dragging {
    z-index: 5;
    box-shadow: 0 10px 28px rgba(0,0,0,0.14);
    opacity: 0.97;
  }
  .card.dragging .drag { cursor: grabbing; }

  .ph-row {
    border: 1px dashed var(--line);
    border-radius: 14px;
  }
  .ph-card {
    flex: 0 0 calc(50% - 9px);
    align-self: stretch;
    border: 1px dashed var(--line);
    border-radius: 14px;
  }

  .counter-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .step {
    width: 76px;
    height: 76px;
    flex: 0 0 auto;
    border: 1px solid var(--line);
    background: var(--btn);
    color: var(--text);
    font-size: 34px;
    font-weight: 400;
    line-height: 1;
    border-radius: 50%;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    transition: background-color .15s ease, border-color .15s ease, transform .1s ease;
  }
  .step:active { transform: scale(0.94); }
  .step.plus {
    background: var(--accent-soft);
    border-color: var(--accent-soft);
    color: var(--accent);
  }
  @media (hover: hover) {
    .step:hover { background: #dcdcdc; border-color: #d0d0d0; }
    .step.plus:hover { background: #a5d4c7; border-color: #96cabc; }
  }
  .step:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .count {
    flex: 1 1 auto;
    text-align: center;
    font-size: 52px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-width: 0;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .card-footer {
    display: flex;
    justify-content: center;
    margin-top: 12px;
  }

  .reset {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 12.5px;
    letter-spacing: 0.3px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .reset:hover, .reset:focus-visible { color: var(--text); background: var(--btn); outline: none; }

  /* Pinned to the bottom of the screen; the list scrolls behind it. */
  .add {
    display: block;
    position: fixed;
    bottom: calc(12px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 448px;          /* wrap max-width minus its side padding */
    z-index: 4;                /* under a dragged card (5) and the modal (10) */
    padding: 15px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    border-radius: 999px;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
  }
  .add:active { transform: translateX(-50%) scale(0.99); }
  .add:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0 8px;
  }
  /* Projects empty state floats in the middle of the screen. */
  #plist .empty {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 0;
    width: max-content;
    max-width: calc(100% - 32px);
  }
  .empty-icon {
    display: block;
    width: 58px;
    height: 58px;
    margin: 0 auto 14px;
  }
  .empty-icon img { width: 100%; height: 100%; display: block; }

  /* History of the last 5 reset / removed counts — tucked behind a clock
     icon on the All Projects row, top right, since it's rarely needed. */
  .history-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: -4px;                 /* centers the 34px button on the back-button row */
    right: -8px;               /* mirror of .back's -10px edge alignment */
    width: 34px;
    height: 34px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 50%;
    cursor: pointer;
    touch-action: manipulation;
  }
  .history-toggle[hidden] { display: none; }
  .history-toggle:hover, .history-toggle:focus-visible { color: var(--text); background: var(--btn); outline: none; }
  .history-toggle.open { color: var(--text); background: var(--btn); }

  .history {
    margin-top: auto;    /* pushes History to the bottom when counters don't fill the screen */
    padding-top: 40px;   /* guaranteed gap above History when counters already fill the screen */
  }
  .history h2 {
    margin: 0 0 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
  .h-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 10px 6px;
    border-bottom: 1px solid var(--line);
  }
  .h-row:last-child { border-bottom: none; }
  .h-count {
    flex: 0 0 auto;
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .h-label {
    flex: 0 1 auto;
    min-width: 0;
    font-size: 13.5px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .h-meta {
    flex: 0 0 auto;
    font-size: 12.5px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Confirm dialog */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(43, 43, 43, 0.32);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  .overlay[hidden] { display: none; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  .modal p {
    margin: 0 0 18px;
    font-size: 15px;
    text-align: center;
    overflow-wrap: break-word;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
  }
  .modal-actions button {
    flex: 1 1 0;
    padding: 11px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    touch-action: manipulation;
  }
  #modal-cancel {
    border: 1px solid var(--line);
    background: var(--btn);
    color: var(--text);
  }
  #modal-ok {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
  }
  .modal-actions button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
  <div class="wrap" id="screen-project">
    <header>
      <button class="back" id="to-projects" type="button">All Projects</button>
      <button class="history-toggle" id="history-toggle" type="button" aria-label="Show history" aria-expanded="false" title="History" hidden>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
      </button>
      <div class="title-row">
        <span class="p-icon" id="project-icon" aria-hidden="true"></span>
        <input class="project-name" id="project-name" type="text" placeholder="Untitled project" aria-label="Project name" readonly>
        <button class="title-edit" id="project-rename" type="button" aria-label="Rename project">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16.3 4.7 L19.3 7.7 7.5 19.5 4 20 4.5 16.5 Z"/></svg>
        </button>
      </div>
    </header>
    <div class="list" id="list"></div>
    <button class="add" id="add" type="button">+ Add counter</button>
    <section class="history" id="history" hidden></section>
  </div>

  <div class="wrap" id="screen-projects" hidden>
    <header>
      <h1>Projects</h1>
    </header>
    <div class="plist" id="plist"></div>
    <button class="add" id="add-project" type="button">+ Add project</button>
  </div>

  <div class="overlay" id="overlay" hidden>
    <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="modal-msg">
      <p id="modal-msg"></p>
      <div class="modal-actions">
        <button id="modal-cancel" type="button">Cancel</button>
        <button id="modal-ok" type="button">OK</button>
      </div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "stitchCounter.v1";
  var HISTORY_MAX = 5;

  // First run (and the corrupt-data fallback) start with no projects, so the
  // app opens on the "Add a project to start." screen. Zero projects is a
  // fully valid persisted state; "+ Add project" creates "Project 1".
  function seed() {
    return {
      version: 2,
      nextId: 1,
      nextProjectId: 1,
      currentProjectId: null,
      projects: []
    };
  }

  var state = loadState();

  // Normalize one project's counters / rows / history (also migrates the
  // legacy per-card `half` flags into rows).
  function normalizeProject(p) {
    var out = {
      id: String(p.id != null ? p.id : "p_" + Math.random().toString(36).slice(2)),
      name: typeof p.name === "string" ? p.name : "",
      lastUsed: Number(p.lastUsed) || 0,
      history: []
    };
    out.counters = p.counters.map(function (c) {
      return {
        id: String(c && c.id != null ? c.id : "c_" + Math.random().toString(36).slice(2)),
        count: Math.max(0, Math.floor(Number(c && c.count) || 0)),
        note: typeof (c && c.note) === "string" ? c.note : "",
        rowMark: (c && c.rowMark) === "end" ? "end" : "start"
      };
    });

    // Rows: 1–2 counter ids each. Migrate old per-card `half` flags by
    // pairing consecutive half-width counters; otherwise one row per counter.
    var validIds = {};
    out.counters.forEach(function (c) { validIds[c.id] = true; });
    var seen = {};
    var rows = [];
    if (Array.isArray(p.rows)) {
      p.rows.forEach(function (r) {
        if (!Array.isArray(r)) return;
        var ids = r.map(String).filter(function (id) {
          if (!validIds[id] || seen[id]) return false;
          seen[id] = true;
          return true;
        }).slice(0, 2);
        if (ids.length) rows.push(ids);
      });
    } else {
      for (var i = 0; i < p.counters.length; i++) {
        var id = out.counters[i].id;
        if (seen[id]) continue;
        var isHalf = p.counters[i] && p.counters[i].half === true;
        var nextRaw = p.counters[i + 1];
        if (isHalf && nextRaw && nextRaw.half === true && !seen[out.counters[i + 1].id]) {
          rows.push([id, out.counters[i + 1].id]);
          seen[id] = seen[out.counters[i + 1].id] = true;
        } else {
          rows.push([id]);
          seen[id] = true;
        }
      }
    }
    // any counters not covered by rows get their own row
    out.counters.forEach(function (c) {
      if (!seen[c.id]) rows.push([c.id]);
    });
    out.rows = rows;

    out.history = (Array.isArray(p.history) ? p.history : [])
      .slice(0, HISTORY_MAX)
      .map(function (h) {
        return {
          count: Math.max(0, Math.floor(Number(h && h.count) || 0)),
          note: typeof (h && h.note) === "string" ? h.note : "",
          action: (h && h.action) === "removed" ? "removed" : "reset",
          ts: Number(h && h.ts) || 0
        };
      });
    return out;
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return seed();
      var data = JSON.parse(raw);
      if (!data) return seed();

      var rawProjects, nextProjectId;
      if (Array.isArray(data.projects)) {
        rawProjects = data.projects;
        nextProjectId = typeof data.nextProjectId === "number" ? data.nextProjectId : data.projects.length + 1;
      } else if (Array.isArray(data.counters)) {
        // v1 schema: counters lived at the top level — wrap them in one project
        rawProjects = [{ id: "p_1", name: "Project 1", counters: data.counters, rows: data.rows, history: data.history }];
        nextProjectId = 2;
      } else {
        return seed();
      }

      var out = { version: 2, nextProjectId: nextProjectId, projects: [] };
      var seenPid = {};
      rawProjects.forEach(function (p) {
        if (!p || !Array.isArray(p.counters)) return;
        var proj = normalizeProject(p);
        if (seenPid[proj.id]) proj.id = "p_" + Math.random().toString(36).slice(2);
        seenPid[proj.id] = true;
        out.projects.push(proj);
      });
      // zero projects is a valid state (user deleted the last one) — but if
      // the data claimed projects and none survived normalization, reseed
      if (!out.projects.length && rawProjects.length) return seed();

      var totalCounters = 0;
      out.projects.forEach(function (p) { totalCounters += p.counters.length; });
      out.nextId = typeof data.nextId === "number" ? data.nextId : totalCounters + 1;
      out.currentProjectId = seenPid[String(data.currentProjectId)] ? String(data.currentProjectId)
        : out.projects.length ? out.projects[0].id : null;
      return out;
    } catch (e) {
      return seed();
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      /* private mode / quota — keep working in-memory */
    }
  }

  // The project currently being worked on. All counter operations act on it.
  function cur() {
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === state.currentProjectId) return state.projects[i];
    }
    return state.projects[0];
  }

  function findProject(id) {
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === id) return state.projects[i];
    }
    return null;
  }

  function find(id) {
    var counters = cur().counters;
    for (var i = 0; i < counters.length; i++) {
      if (counters[i].id === id) return counters[i];
    }
    return null;
  }

  function isCompact() {
    return cur().rows.some(function (r) { return r.length === 2; });
  }

  // Mark a project as just-edited; the projects list is ordered by this.
  function touch(p) {
    if (p) p.lastUsed = Date.now();
  }

  function pushHistory(counter, action) {
    var p = cur();
    p.history.unshift({
      count: counter.count,
      note: counter.note,
      action: action,
      ts: Date.now()
    });
    p.history = p.history.slice(0, HISTORY_MAX);
  }

  function addCounter() {
    var id = "c_" + state.nextId++;
    var p = cur();
    p.counters.push({ id: id, count: 0, note: "", rowMark: "start" });
    p.rows.push([id]);
    touch(p);
    saveState();
    render();
  }

  function removeCounter(id) {
    var c = find(id);
    if (!c) return;
    var p = cur();
    if (c.count > 0) pushHistory(c, "removed");  // a 0 counter isn't worth remembering
    if (p.counters.length === 1) {
      // never drop to zero counters — removing the last one resets it instead
      c.count = 0;
      c.note = "";
      c.rowMark = "start";
    } else {
      p.counters = p.counters.filter(function (x) { return x.id !== id; });
      p.rows = p.rows.map(function (r) {
        return r.filter(function (x) { return x !== id; });
      }).filter(function (r) { return r.length > 0; });
    }
    touch(p);
    saveState();
    render();
  }

  // ----- projects -----
  function freshCounter() {
    return { id: "c_" + state.nextId++, count: 0, note: "", rowMark: "start" };
  }

  // Default names number from the current list, not the historical creation
  // count: the smallest "Project N" not already taken. With no projects left
  // the next one is "Project 1" again. (Ids still increment forever.)
  function nextProjectName() {
    var used = {};
    state.projects.forEach(function (p) {
      var m = /^project (\d+)$/i.exec(p.name.trim());
      if (m) used[Number(m[1])] = true;
    });
    var n = 1;
    while (used[n]) n++;
    return "Project " + n;
  }

  function addProject() {
    var pid = "p_" + state.nextProjectId++;
    var c = freshCounter();
    state.projects.push({ id: pid, name: nextProjectName(), lastUsed: Date.now(),
                          counters: [c], rows: [[c.id]], history: [] });
    // stay on the projects list — tap the new row to open it
    saveState();
    render();
    // highlight the fresh row's name (selected, ready to overtype) as a
    // nudge to give the project a real name
    var input = plistEl.querySelector('.prow[data-id="' + pid + '"] .p-name');
    if (input) beginNameEdit(input);
  }

  function removeProject(id) {
    var idx = -1;
    for (var i = 0; i < state.projects.length; i++) {
      if (state.projects[i].id === id) { idx = i; break; }
    }
    if (idx < 0) return;
    state.projects.splice(idx, 1);
    if (state.currentProjectId === id) {
      // fall back to the most recently used remaining project
      var best = null;
      state.projects.forEach(function (q) {
        if (!best || (q.lastUsed || 0) > (best.lastUsed || 0)) best = q;
      });
      state.currentProjectId = best ? best.id : null;
    }
    saveState();
    render();
  }

  function renameProject(p, text) {
    if (!p) return;
    p.name = text;             // stored as typed; trimmed on focusout
    touch(p);
    saveState();
    // no render(): keep the input focused/cursor intact
  }

  function increment(id) {
    var c = find(id);
    if (!c) return;
    c.count = Math.min(Number.MAX_SAFE_INTEGER, c.count + 1);
    touch(cur());
    saveState();
    render();
  }

  function decrement(id) {
    var c = find(id);
    if (!c) return;
    c.count = Math.max(0, c.count - 1);
    touch(cur());
    saveState();
    render();
  }

  function resetCounter(id) {
    var c = find(id);
    if (!c || c.count === 0) return;
    pushHistory(c, "reset");
    c.count = 0;
    touch(cur());
    saveState();
    render();
  }

  function toggleRowMark(id) {
    var c = find(id);
    if (!c) return;
    c.rowMark = c.rowMark === "start" ? "end" : "start";
    touch(cur());
    saveState();
    render();
  }

  function updateNote(id, text) {
    var c = find(id);
    if (!c) return;
    c.note = text;            // stored as typed; trimmed on focusout
    touch(cur());
    saveState();
    // no render(): keep the input focused/cursor intact
  }

  // ----- confirm dialog -----
  var overlay = document.getElementById("overlay");
  var modalMsg = document.getElementById("modal-msg");
  var modalOk = document.getElementById("modal-ok");
  var modalCancel = document.getElementById("modal-cancel");
  var pendingOk = null;

  function showConfirm(message, okLabel, onOk) {
    modalMsg.textContent = message;
    modalOk.textContent = okLabel;
    pendingOk = onOk;
    overlay.hidden = false;
    modalCancel.focus();
  }

  function closeConfirm() {
    overlay.hidden = true;
    pendingOk = null;
  }

  modalOk.addEventListener("click", function () {
    var fn = pendingOk;
    closeConfirm();
    if (fn) fn();
  });
  modalCancel.addEventListener("click", closeConfirm);
  overlay.addEventListener("click", function (e) {
    if (e.target === overlay) closeConfirm();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && !overlay.hidden) closeConfirm();
  });

  function confirmReset(id) {
    var c = find(id);
    if (!c || c.count === 0) return;  // nothing to reset
    var name = c.note ? "“" + c.note + "”" : "this counter";
    showConfirm("Reset " + name + " from " + c.count + " to 0?", "Reset", function () {
      resetCounter(id);
    });
  }

  function confirmRemove(id, card) {
    var c = find(id);
    if (!c) return;
    var doRemove = function () {
      card.classList.add("removing");
      setTimeout(function () { removeCounter(id); }, 160);
    };
    if (c.count === 0) {
      doRemove();  // nothing counted yet — no confirm needed
      return;
    }
    var name = c.note ? "“" + c.note + "”" : "this counter";
    showConfirm("Remove " + name + "?", "Remove", doRemove);
  }

  function confirmRemoveProject(id) {
    var p = findProject(id);
    if (!p) return;
    var hasCounts = p.counters.some(function (c) { return c.count > 0; });
    if (!hasCounts && p.history.length === 0) {
      removeProject(id);       // nothing counted yet — no confirm needed
      return;
    }
    var name = p.name.trim() ? "“" + p.name.trim() + "”" : "this project";
    showConfirm("Delete " + name + "? Its counters will be lost.", "Delete", function () {
      removeProject(id);
    });
  }

  // ----- rendering -----
  var listEl = document.getElementById("list");
  var historyEl = document.getElementById("history");
  var screenProjectEl = document.getElementById("screen-project");
  var screenProjectsEl = document.getElementById("screen-projects");
  var projectNameEl = document.getElementById("project-name");
  var projectIconEl = document.getElementById("project-icon");
  var plistEl = document.getElementById("plist");

  // Auto-size the name input to its text so the type icon sits right next
  // to it; the pair is centered by the .title-row flexbox.
  var measureCtx = document.createElement("canvas").getContext("2d");

  // Name fields are readonly + tap-transparent until their pencil button
  // switches editing on; editing ends on blur or any tap outside the field.
  function beginNameEdit(input) {
    input.readOnly = false;
    input.classList.add("editing");
    input.focus();
    input.select();
  }

  function endNameEdit(input) {
    input.classList.remove("editing");
    input.readOnly = true;
  }

  document.addEventListener("pointerdown", function (e) {
    var editing = document.querySelector(".p-name.editing, .project-name.editing");
    if (editing && e.target !== editing) {
      endNameEdit(editing);
      editing.blur();
    }
  });

  // Size an editable name input to its text so only the name captures taps.
  function sizeNameInput(input, extra) {
    var cs = getComputedStyle(input);
    measureCtx.font = cs.fontWeight + " " + cs.fontSize + " " + cs.fontFamily;
    var w = measureCtx.measureText(input.value || input.placeholder).width;
    input.style.width = Math.ceil(w + extra) + "px";
  }

  function refreshProjectTitle() {
    projectIconEl.innerHTML = iconSvg(projectIconKey(projectNameEl.value));
    sizeNameInput(projectNameEl, 20);   // + padding & caret
  }

  // Which screen is showing — transient, not persisted; reload lands on the
  // current project ready to count.
  var view = "project";

  // History starts hidden — it's rarely needed. Transient, not persisted.
  var historyOpen = false;
  var historyToggleEl = document.getElementById("history-toggle");

  function fmtTime(ts) {
    if (!ts) return "";
    return new Date(ts).toLocaleString([], {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }

  function buildCard(c, compact) {
    var card = document.createElement("div");
    card.className = "card";
    card.dataset.id = c.id;

    var rowmark = document.createElement("button");
    rowmark.className = "rowmark";
    rowmark.type = "button";
    rowmark.dataset.action = "rowmark";
    rowmark.setAttribute("aria-label", "Toggle start or end of row");
    // shorter text when cards are compact
    rowmark.textContent = (c.rowMark === "end" ? "end" : "start") + (compact ? "" : " of row");
    card.appendChild(rowmark);

    var label = document.createElement("input");
    label.className = "label";
    label.type = "text";
    label.value = c.note;
    label.placeholder = "…";
    label.dataset.action = "note";
    label.setAttribute("aria-label", "Counter label");
    card.appendChild(label);

    var remove = document.createElement("button");
    remove.className = "remove";
    remove.type = "button";
    remove.dataset.action = "remove";
    remove.setAttribute("aria-label", "Remove counter");
    remove.textContent = "×";
    card.appendChild(remove);

    if (cur().counters.length > 1) {
      var drag = document.createElement("button");
      drag.className = "drag";
      drag.type = "button";
      drag.setAttribute("aria-label", "Drag to reorder");
      drag.textContent = "⠿";
      card.appendChild(drag);
    }

    var row = document.createElement("div");
    row.className = "counter-row";

    var minus = document.createElement("button");
    minus.className = "step minus";
    minus.type = "button";
    minus.dataset.action = "dec";
    minus.setAttribute("aria-label", "Decrease");
    minus.textContent = "−";

    var count = document.createElement("div");
    count.className = "count";
    count.title = "Double-tap to reset";
    count.textContent = c.count;

    var plus = document.createElement("button");
    plus.className = "step plus";
    plus.type = "button";
    plus.dataset.action = "inc";
    plus.setAttribute("aria-label", "Increase");
    plus.textContent = "+";

    row.appendChild(minus);
    row.appendChild(count);
    row.appendChild(plus);
    card.appendChild(row);

    var footer = document.createElement("div");
    footer.className = "card-footer";
    var reset = document.createElement("button");
    reset.className = "reset";
    reset.type = "button";
    reset.dataset.action = "reset";
    reset.textContent = "Reset";
    footer.appendChild(reset);
    card.appendChild(footer);

    return card;
  }

  function render() {
    if (!state.projects.length) view = "projects";   // no project to show
    var showingProjects = view === "projects";
    screenProjectEl.hidden = showingProjects;
    screenProjectsEl.hidden = !showingProjects;
    if (showingProjects) {
      renderProjects();
      return;
    }

    // don't clobber the name while the user is typing in it
    if (document.activeElement !== projectNameEl) projectNameEl.value = cur().name;
    refreshProjectTitle();

    listEl.innerHTML = "";
    var compact = isCompact();
    listEl.classList.toggle("compact", compact);

    var p = cur();
    if (p.counters.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No counters yet.";
      listEl.appendChild(empty);
    }

    p.rows.forEach(function (rowIds) {
      var rowEl = document.createElement("div");
      rowEl.className = "row";
      rowIds.forEach(function (id) {
        var c = find(id);
        if (c) rowEl.appendChild(buildCard(c, compact));
      });
      listEl.appendChild(rowEl);
    });

    renderHistory();
  }

  // ----- project icons -----
  // Simple line icons, drawn inline (24x24, stroke = currentColor) so the
  // app stays a single offline file. Picked by keywords in the project name.
  var PROJECT_ICONS = {
    sweater: '<path d="M7.5 4 L5 5.2 C3.4 6 2.6 7.8 3 9.6 L4.6 16.2 H7 V20 H17 V16.2 H19.4 L21 9.6 C21.4 7.8 20.6 6 19 5.2 L16.5 4 C15.2 5.3 13.7 6 12 6 C10.3 6 8.8 5.3 7.5 4 Z"/><path d="M7 16.2 V10.5"/><path d="M17 16.2 V10.5"/>',
    tshirt: '<path d="M7.5 4 L4.5 5.6 2.8 8.8 5.8 10.6 V19.5 H18.2 V10.6 L21.2 8.8 19.5 5.6 16.5 4 C15.3 5.2 13.7 5.8 12 5.8 C10.3 5.8 8.7 5.2 7.5 4 Z"/>',
    scarf: '<path d="M9.2 3.5 H14.8 V17.5 H9.2 Z"/><path d="M9.2 6.5 H14.8"/><path d="M10 17.5 V20.5"/><path d="M12 17.5 V20.5"/><path d="M14 17.5 V20.5"/>',
    sock: '<path d="M8.5 3.5 H15.5 V11.5 C15.5 15.5 13.2 18 10 18 C7.3 18 5.6 16.2 5.6 13.9 C5.6 12.1 6.8 10.9 8.5 10.3 Z"/><path d="M8.5 6.5 H15.5"/>',
    pants: '<path d="M6.5 3.5 H17.5 L18.8 20.5 H13.9 L12 11.5 10.1 20.5 H5.2 Z"/><path d="M6.5 6.5 H17.5"/>',
    skirt: '<path d="M8 4 H16 L19.2 18.6 C17 19.9 14.6 20.5 12 20.5 C9.4 20.5 7 19.9 4.8 18.6 Z"/><path d="M7.4 7 H16.6"/>',
    hat: '<circle cx="12" cy="3.8" r="1.3"/><path d="M5.5 16 C5.5 9.8 8.4 6.2 12 6.2 C15.6 6.2 18.5 9.8 18.5 16"/><path d="M4.5 16 H19.5 V19 H4.5 Z"/>',
    mitten: '<path d="M7 20.5 V10 C7 6.5 9.2 4 12 4 C14.8 4 17 6.5 17 10 V11.2 C18.8 10.6 20.4 12 20 13.8 C19.7 15.2 18.4 16 17 15.7 V20.5 Z"/><path d="M7 17 H17"/>',
    blanket: '<rect x="4" y="5.5" width="16" height="13" rx="2"/><path d="M4 9.5 H20"/><path d="M4 13.5 H20"/>',
    dress: '<path d="M9 3.5 H15 L14.2 8.2 C16.9 10.8 18.4 14.6 18.4 18.6 C16.4 19.8 14.2 20.5 12 20.5 C9.8 20.5 7.6 19.8 5.6 18.6 C5.6 14.6 7.1 10.8 9.8 8.2 Z"/><path d="M9.8 8.2 H14.2"/>',
    yarn: '<circle cx="10" cy="14" r="6.5"/><path d="M4.3 12 Q10 10.2 15.7 12"/><path d="M3.6 15.2 Q10 13.4 16.4 15.2"/><path d="M5 18.4 Q10 16.8 15 18.4"/><path d="M20.8 3.2 L13 19.5"/><path d="M22 8 L15.8 19.8"/>'
  };

  // First match wins — more specific garments come before generic words, so
  // e.g. "top-down sweater" hits sweater, not tshirt's "top".
  var ICON_KEYWORDS = [
    ["blanket", ["blanket", "blankets", "throw", "afghan"]],
    ["dress", ["dress", "dresses", "gown"]],
    ["skirt", ["skirt", "skirts", "tutu"]],
    ["pants", ["pants", "trousers", "leggings", "shorts", "joggers"]],
    ["sock", ["sock", "socks", "stocking", "stockings", "slipper", "slippers", "bootie", "booties"]],
    ["mitten", ["mitten", "mittens", "glove", "gloves"]],
    ["hat", ["hat", "hats", "beanie", "beanies", "cap", "balaclava", "headband"]],
    ["sweater", ["sweater", "sweaters", "jumper", "pullover", "cardigan", "cardi", "hoodie", "vest"]],
    ["scarf", ["scarf", "scarves", "cowl", "shawl", "wrap"]],
    ["tshirt", ["tshirt", "t-shirt", "tee", "shirt", "top", "tank", "camisole"]]
  ];

  function projectIconKey(name) {
    var words = String(name).toLowerCase();
    for (var i = 0; i < ICON_KEYWORDS.length; i++) {
      var kws = ICON_KEYWORDS[i][1];
      for (var j = 0; j < kws.length; j++) {
        if (new RegExp("\\b" + kws[j] + "\\b").test(words)) return ICON_KEYWORDS[i][0];
      }
    }
    return "yarn";   // default: ball of yarn + needles
  }

  function iconSvg(key) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
      + PROJECT_ICONS[key] + "</svg>";
  }

  // Simplified line version of the app icon — a yarn ball with two
  // knob-tipped needles. Kept minimal (uniform stroke, few shapes) so it
  // stays legible at small sizes. Inline so it works offline.
  // Traced 1:1 from the owner's reference glyph (icon-source.png) via

  function renderProjects() {
    plistEl.innerHTML = "";
    if (state.projects.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      var eIcon = document.createElement("span");
      eIcon.className = "empty-icon";
      eIcon.innerHTML = EMPTY_ICON;
      empty.appendChild(eIcon);
      empty.appendChild(document.createTextNode("Add a project to start."));
      plistEl.appendChild(empty);
      return;
    }
    // newest last-edit first
    var ordered = state.projects.slice().sort(function (a, b) {
      return (b.lastUsed || 0) - (a.lastUsed || 0);
    });
    ordered.forEach(function (p) {
      var wrap = document.createElement("div");
      wrap.className = "prow-wrap";
      wrap.dataset.id = p.id;

      var del = document.createElement("button");
      del.className = "p-delete";
      del.type = "button";
      del.textContent = "Delete";
      del.setAttribute("aria-label", "Delete project");
      wrap.appendChild(del);

      var row = document.createElement("div");
      row.className = "prow";
      row.dataset.id = p.id;

      var icon = document.createElement("span");
      icon.className = "p-icon";
      icon.innerHTML = iconSvg(projectIconKey(p.name));
      row.appendChild(icon);

      var name = document.createElement("input");
      name.className = "p-name";
      name.type = "text";
      name.value = p.name;
      name.readOnly = true;              // editable only via the pencil
      name.placeholder = "Untitled project";
      name.setAttribute("aria-label", "Project name");

      var edit = document.createElement("button");
      edit.className = "p-edit";
      edit.type = "button";
      edit.setAttribute("aria-label", "Rename project");
      edit.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16.3 4.7 L19.3 7.7 7.5 19.5 4 20 4.5 16.5 Z"/></svg>';

      row.appendChild(name);
      row.appendChild(edit);
      wrap.appendChild(row);
      plistEl.appendChild(wrap);
      sizeNameInput(name, 16);   // only the name itself is tap-to-edit
    });
  }

  function renderHistory() {
    historyEl.innerHTML = "";
    var history = cur().history;
    historyToggleEl.hidden = history.length === 0;
    historyToggleEl.classList.toggle("open", historyOpen);
    historyToggleEl.setAttribute("aria-expanded", historyOpen ? "true" : "false");
    historyToggleEl.setAttribute("aria-label", historyOpen ? "Hide history" : "Show history");
    if (history.length === 0 || !historyOpen) {
      historyEl.hidden = true;
      return;
    }
    historyEl.hidden = false;

    var title = document.createElement("h2");
    title.textContent = "History";
    historyEl.appendChild(title);

    history.forEach(function (h) {
      var row = document.createElement("div");
      row.className = "h-row";

      var count = document.createElement("div");
      count.className = "h-count";
      count.textContent = h.count;

      var label = document.createElement("span");
      label.className = "h-label";
      label.textContent = h.note || "Counter";

      var meta = document.createElement("span");
      meta.className = "h-meta";
      meta.textContent = "· " + h.action + " · " + fmtTime(h.ts);

      row.appendChild(count);
      row.appendChild(label);
      row.appendChild(meta);
      historyEl.appendChild(row);
    });
  }

  // ----- events (delegated — survive re-renders) -----
  listEl.addEventListener("click", function (e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var card = e.target.closest(".card");
    if (!card) return;
    var id = card.dataset.id;
    var action = btn.dataset.action;

    if (action === "inc") increment(id);
    else if (action === "dec") decrement(id);
    else if (action === "reset") confirmReset(id);
    else if (action === "rowmark") toggleRowMark(id);
    else if (action === "remove") confirmRemove(id, card);
  });

  // Double-tap / double-click the big number also resets (with confirm).
  listEl.addEventListener("dblclick", function (e) {
    if (!e.target.closest(".count")) return;
    var card = e.target.closest(".card");
    if (!card) return;
    confirmReset(card.dataset.id);
  });

  listEl.addEventListener("input", function (e) {
    if (e.target.dataset.action !== "note") return;
    var card = e.target.closest(".card");
    if (!card) return;
    updateNote(card.dataset.id, e.target.value);
  });

  // Trim whitespace-only labels when the field loses focus.
  listEl.addEventListener("focusout", function (e) {
    if (e.target.dataset.action !== "note") return;
    var card = e.target.closest(".card");
    if (!card) return;
    var trimmed = e.target.value.trim();
    if (trimmed !== e.target.value) {
      e.target.value = trimmed;
      updateNote(card.dataset.id, trimmed);
    }
  });

  // ----- drag to reorder / pair -----
  // Drop a card between rows → it gets its own row. Drop it on the left or
  // right side of a row that has one card → they pair up and share the row.
  // Width adapts automatically: any pair → all cards compact; no pairs → full.
  var dragState = null;

  listEl.addEventListener("pointerdown", function (e) {
    var handle = e.target.closest(".drag");
    if (!handle || dragState) return;
    var card = handle.closest(".card");
    if (!card) return;
    e.preventDefault();

    var rect = card.getBoundingClientRect();
    var srcRow = card.parentNode;
    var ph = document.createElement("div");
    var srcHasPartner = srcRow.querySelectorAll(".card").length === 2;

    if (srcHasPartner) {
      ph.className = "ph-card";
      srcRow.insertBefore(ph, card);
      srcRow.classList.add("pair-preview");
    } else {
      ph.className = "ph-row";
      ph.style.height = rect.height + "px";
      listEl.insertBefore(ph, srcRow);
    }

    card.classList.add("dragging");
    card.style.position = "fixed";
    card.style.left = rect.left + "px";
    card.style.top = rect.top + "px";
    card.style.width = rect.width + "px";
    // fixed-positioned, so this doesn't affect layout — frees the source row
    listEl.appendChild(card);
    if (!srcHasPartner) srcRow.remove();

    dragState = {
      card: card, ph: ph,
      height: rect.height,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      pointerId: e.pointerId
    };
    handle.setPointerCapture(e.pointerId);
  });

  function clearPairPreviews() {
    Array.prototype.forEach.call(listEl.querySelectorAll(".row.pair-preview"), function (r) {
      if (!r.querySelector(".ph-card") || r.querySelectorAll(".card").length === 2) {
        r.classList.remove("pair-preview");
      }
    });
  }

  listEl.addEventListener("pointermove", function (e) {
    if (!dragState || e.pointerId !== dragState.pointerId) return;
    dragState.card.style.top = (e.clientY - dragState.offsetY) + "px";
    dragState.card.style.left = (e.clientX - dragState.offsetX) + "px";

    var px = e.clientX, py = e.clientY;
    var ph = dragState.ph;
    var rows = Array.prototype.filter.call(listEl.children, function (el) {
      return el.classList.contains("row") && el.querySelector(".card");
    });

    // Decide where the card would land: its own new row, or paired beside
    // a lone card (pointer on the outer third of that card).
    var desired = { type: "row-end" };
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i].getBoundingClientRect();
      if (py < r.top) { desired = { type: "row-before", row: rows[i] }; break; }
      if (py <= r.bottom) {
        var cards = rows[i].querySelectorAll(".card");
        if (cards.length === 1) {
          var cr = cards[0].getBoundingClientRect();
          if (px < cr.left + cr.width * 0.35) desired = { type: "pair", row: rows[i], side: "before", ref: cards[0] };
          else if (px > cr.right - cr.width * 0.35) desired = { type: "pair", row: rows[i], side: "after", ref: cards[0] };
          else desired = py < r.top + r.height / 2
            ? { type: "row-before", row: rows[i] }
            : { type: "row-after", row: rows[i] };
        } else {
          desired = py < r.top + r.height / 2
            ? { type: "row-before", row: rows[i] }
            : { type: "row-after", row: rows[i] };
        }
        break;
      }
    }

    var parent, ref;
    if (desired.type === "pair") {
      parent = desired.row;
      ref = desired.side === "before" ? desired.ref : null;
    } else {
      parent = listEl;
      ref = desired.type === "row-before" ? desired.row
          : desired.type === "row-after" ? desired.row.nextSibling
          : null;
    }

    // already in the right spot? (insertBefore(ph, ph) is a harmless no-op,
    // but skipping avoids style churn)
    if (ph.parentNode === parent && (ph.nextSibling === ref || ph === ref)) return;

    if (desired.type === "pair") {
      ph.className = "ph-card";
      ph.style.height = "";
      parent.insertBefore(ph, ref);
      parent.classList.add("pair-preview");
    } else {
      ph.className = "ph-row";
      ph.style.height = dragState.height + "px";
      parent.insertBefore(ph, ref);
    }
    clearPairPreviews();
  });

  function endDrag() {
    var s = dragState;
    if (!s) return;
    dragState = null;

    var dragId = s.card.dataset.id;
    var newRows = [];
    Array.prototype.forEach.call(listEl.children, function (el) {
      if (el === s.ph) {
        newRows.push([dragId]);
      } else if (el.classList.contains("row")) {
        var ids = [];
        Array.prototype.forEach.call(el.children, function (child) {
          if (child === s.ph) ids.push(dragId);
          else if (child.classList.contains("card") && child !== s.card) ids.push(child.dataset.id);
        });
        if (ids.length) newRows.push(ids.slice(0, 2));
      }
    });

    var p = cur();
    p.rows = newRows;
    // keep the flat counter order in reading order
    var flat = [];
    newRows.forEach(function (r) { r.forEach(function (id) { flat.push(id); }); });
    p.counters.sort(function (a, b) {
      return flat.indexOf(a.id) - flat.indexOf(b.id);
    });
    touch(p);
    saveState();
    render();   // rebuilds everything — placeholder and inline styles included
  }

  listEl.addEventListener("pointerup", function (e) {
    if (dragState && e.pointerId === dragState.pointerId) endDrag();
  });
  listEl.addEventListener("pointercancel", function (e) {
    if (dragState && e.pointerId === dragState.pointerId) endDrag();
  });

  document.getElementById("add").addEventListener("click", addCounter);

  historyToggleEl.addEventListener("click", function () {
    historyOpen = !historyOpen;
    render();
    // the list lives at the bottom of the page — bring it into view if needed
    if (historyOpen) historyEl.scrollIntoView({ block: "nearest", behavior: "smooth" });
  });

  // ----- project screen navigation -----
  document.getElementById("to-projects").addEventListener("click", function () {
    view = "projects";
    render();
  });

  document.getElementById("add-project").addEventListener("click", addProject);

  plistEl.addEventListener("click", function (e) {
    if (suppressClick) { suppressClick = false; return; }   // tail of a swipe
    if (e.target.closest(".p-delete")) {
      confirmRemoveProject(e.target.closest(".prow-wrap").dataset.id);
      return;
    }
    var row = e.target.closest(".prow");
    if (!row) return;
    if (row.classList.contains("swiped")) {
      row.classList.remove("swiped");          // tap a swiped row → just close it
      return;
    }
    if (e.target.closest(".p-edit")) {
      beginNameEdit(row.querySelector(".p-name"));
      return;
    }
    if (e.target.closest(".p-name")) return;   // editing the name, not opening
    state.currentProjectId = row.dataset.id;
    touch(findProject(row.dataset.id));        // selected → top of the list
    view = "project";
    historyOpen = false;   // land on a project with history tucked away
    saveState();
    render();
  });

  // ----- swipe a project row left to reveal Delete -----
  var rowSwipe = null;
  var suppressClick = false;

  plistEl.addEventListener("pointerdown", function (e) {
    var row = e.target.closest(".prow");
    var wrap = e.target.closest(".prow-wrap");
    var open = plistEl.querySelector(".prow.swiped");
    // one open at a time — but pressing the open row's own Delete button
    // must NOT close it, or the row slides back over the button mid-tap
    if (open && open !== row && open.closest(".prow-wrap") !== wrap) {
      open.classList.remove("swiped");
    }
    if (!row) return;
    // don't hijack a drag-to-select inside a focused name field
    if (e.target.classList && e.target.classList.contains("p-name") && document.activeElement === e.target) return;
    rowSwipe = {
      row: row, id: e.pointerId,
      x: e.clientX, y: e.clientY,
      base: row.classList.contains("swiped") ? -96 : 0,
      engaged: false, off: null
    };
  });

  plistEl.addEventListener("pointermove", function (e) {
    if (!rowSwipe || e.pointerId !== rowSwipe.id) return;
    var dx = e.clientX - rowSwipe.x;
    var dy = e.clientY - rowSwipe.y;
    if (!rowSwipe.engaged) {
      // engage only on a clearly horizontal move
      if (Math.abs(dx) < 12 || Math.abs(dx) < Math.abs(dy)) return;
      rowSwipe.engaged = true;
      rowSwipe.row.style.transition = "none";
      try { rowSwipe.row.setPointerCapture(e.pointerId); } catch (err) { /* synthetic events */ }
    }
    rowSwipe.off = Math.max(-96, Math.min(0, rowSwipe.base + dx));
    rowSwipe.row.style.transform = "translateX(" + rowSwipe.off + "px)";
  });

  function endRowSwipe(e) {
    if (!rowSwipe || e.pointerId !== rowSwipe.id) return;
    var s = rowSwipe;
    rowSwipe = null;
    if (!s.engaged) return;
    suppressClick = true;   // the pointerup's click is the swipe's tail, not a tap
    setTimeout(function () { suppressClick = false; }, 50);
    s.row.style.transition = "";
    s.row.style.transform = "";
    s.row.classList.toggle("swiped", (s.off === null ? s.base : s.off) < -48);
  }
  plistEl.addEventListener("pointerup", endRowSwipe);
  plistEl.addEventListener("pointercancel", endRowSwipe);

  // Rename in place from the projects list; the row's icon follows live.
  // No render() — the row would be rebuilt (and re-sorted) under the cursor.
  plistEl.addEventListener("input", function (e) {
    if (!e.target.classList.contains("p-name")) return;
    var row = e.target.closest(".prow");
    renameProject(findProject(row.dataset.id), e.target.value);
    row.querySelector(".p-icon").innerHTML = iconSvg(projectIconKey(e.target.value));
    sizeNameInput(e.target, 16);   // width follows the text live
  });

  plistEl.addEventListener("focusout", function (e) {
    if (!e.target.classList.contains("p-name")) return;
    endNameEdit(e.target);   // back to tap-opens-project
    var trimmed = e.target.value.trim();
    if (trimmed !== e.target.value) {
      e.target.value = trimmed;
      renameProject(findProject(e.target.closest(".prow").dataset.id), trimmed);
    }
  });

  projectNameEl.addEventListener("input", function () {
    renameProject(cur(), projectNameEl.value);
    refreshProjectTitle();   // icon + input width follow the text live
  });

  document.getElementById("project-rename").addEventListener("click", function () {
    beginNameEdit(projectNameEl);
  });

  // Trim whitespace-only names when the field loses focus.
  projectNameEl.addEventListener("focusout", function () {
    endNameEdit(projectNameEl);   // back to pencil-only
    var trimmed = projectNameEl.value.trim();
    if (trimmed !== projectNameEl.value) {
      projectNameEl.value = trimmed;
      renameProject(cur(), trimmed);
    }
  });

  render();

  // Offline cache when hosted over https (e.g. GitHub Pages). Deliberately
  // not registered on file:// or the local http preview.
  if ("serviceWorker" in navigator && location.protocol === "https:") {
    navigator.serviceWorker.register("sw.js");
  }
})();
</script>
</body>
</html>
